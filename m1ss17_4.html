<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Change Background Color</title>
    <style>
        body {
            background-color: green;
            color: black;
            font-family: Arial, sans-serif;
            padding: 20px;
            transition: background-color 0.3s ease;
        }

        h1 {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .square {
            width: 150px;
            height: 150px;
            border: 2px solid black;
            cursor: pointer;
        }

        .yellow { background-color: yellow; }
        .green { background-color: green; }
        .gray { background-color: gray; }
    </style>
</head>
<body>

    <h1>Change background color</h1>
    <p>Mouse over the square</p>

    <div class="container">
        <div class="square yellow" onmouseover="changeBg('yellow')"></div>
        <div class="square green" onmouseover="changeBg('green')"></div>
        <div class="square gray" onmouseover="changeBg('gray')"></div>
    </div>

    <script>
        function changeBg(color) {
            document.body.style.backgroundColor = color;
        }
    </script>

</body>
</html>
