<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ẩn Hiện Văn Bản</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h1 {
            font-size: 48px;
            font-weight: normal;
            margin-bottom: 30px;
        }
        button {
            font-size: 32px;
            padding: 10px 25px;
            margin-right: 15px;
            cursor: pointer;
            background-color: #e1e1e1;
            border: 2px solid #767676;
            border-radius: 8px;
        }
        button:hover {
            background-color: #d0d0d0;
        }
    </style>
</head>
<body>

    <h1 id="textDisplay">This is a text</h1>

    <button onclick="hideText()">Hide text</button>
    <button onclick="showText()">Show text</button>

    <script>
        function hideText() {
            document.getElementById("textDisplay").style.display = "none";
        }

        function showText() {
            document.getElementById("textDisplay").style.display = "block";
        }
    </script>

</body>
</html>
