<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Modal Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        /* Nút Open Modal */
        .open-btn {
            padding: 5px 10px;
            font-size: 14px;
            cursor: pointer;
        }

        /* Lớp nền tối bao phủ toàn màn hình */
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        /* Hộp thoại Modal trắng ở giữa */
        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 40px 60px;
            width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Nút đóng x */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #333;
        }
    </style>
</head>
<body>

    <h1>Modal Example</h1>
    <button class="open-btn" onclick="openModal()">Open Modal</button>

    <!-- Thành phần cấu trúc Modal bao gồm cả lớp nền tối -->
    <div id="myModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <p>Some text in the Modal</p>
        </div>
    </div>

    <script>
        let modal = document.getElementById("myModal");

        function openModal() {
            modal.style.display = "block";
        }

        function closeModal() {
            modal.style.display = "none";
        }

        // Chức năng đóng khi click ra ngoài vùng trắng (vùng nền tối)
        function closeModalOnOverlay(event) {
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>

</body>
</html>
